name: Security Automation Core

on: [push]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  automated-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Self-Healing Scanner
        run: python scanner.py

      - name: Autonomous Git Writeback (Auto-Commit Fixes)
        run: |
          # 1. Configure a secure system bot profile
          git config --global user.name "devsecops-healing-bot"
          git config --global user.email "bot@devsecops.local"
          
          # 2. Check if the script actually modified the configuration file
          if [ -n "$(git status --porcelain web_config.conf)" ]; then
            echo "[⚙️] Modifications detected! Committing patches autonomously..."
            git add web_config.conf
            git commit -m "security: [Autonomous Patch] Injected missing security headers"
            git push origin main
          else
            echo "[✓] No vulnerability detected. Codebase matches high security standards."
          fi

      - name: Deploy Self-Healed Dashboard
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
