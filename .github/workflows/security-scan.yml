name: Security Automation Core

on: [push]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  automated-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Self-Healing Scanner
        run: python scanner.py

      - name: Deploy Self-Healed Dashboard
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
