name: Security Automation Core

on: [push]

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  automated-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Security Scanner
        run: python scanner.py
        continue-on-error: true # Yeh line script fail hone par bhi workflow ko aage chalne degi

      - name: Upload Report Data Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Security-Scan-Report
          path: public/

      - name: Deploy Dashboard to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
