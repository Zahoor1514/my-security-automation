name: Security Automation Core

on: [push]

jobs:
  automated-scan:
    runs-on: ubuntu-latest
    steps:
      - name: Code Checkout
        uses: actions/checkout@v4

      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Execute Security Scanner
        env:
          # Dynamic Inputs (Yahan aap kisi bhi domain ka naam badal sakte hain)
          SCAN_TARGET: "https://example.com"
          # Securely connecting Webhook Secret from GitHub Vault
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: python scanner.py

      - name: Upload Security Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: Security-Scan-Report
          path: security_report.json
